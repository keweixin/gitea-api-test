name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g allure-commandline

      - name: Start Gitea and MySQL
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for MySQL
        run: sleep 15

      - name: Wait for Gitea
        run: |
          echo "Waiting for Gitea..."
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
              echo "Gitea is ready!"
              exit 0
            fi
            echo "Waiting... ($i/90)"
            sleep 3
          done
          echo "::error::Gitea startup timeout"
          docker compose -f docker-compose.yml logs
          exit 1

      - name: Initialize Gitea
        run: sleep 30

      - name: Bootstrap test data
        id: bootstrap
        run: |
          # Create admin user
          docker compose -f docker-compose.yml exec -T gitea gitea admin user create \
            --username admin_user \
            --password Admin123456 \
            --email admin@test.com \
            --admin \
            --must-change-password=false 2>/dev/null || echo "User may exist"

          sleep 10

          # Create API token
          TOKEN_RESPONSE=$(curl -sS \
            -u admin_user:Admin123456 \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-token"}' \
            http://127.0.0.1:3000/api/v1/users/admin_user/tokens 2>&1)

          echo "Token response: $TOKEN_RESPONSE"

          # Extract token using Python
          TOKEN=$(echo "$TOKEN_RESPONSE" > /tmp/token.json && python3 -c "
import json
with open('/tmp/token.json') as f:
    data = json.load(f)
    print(data.get('sha1', data.get('token', '')))
" 2>/dev/null || echo "")

          if [ -z "$TOKEN" ]; then
            echo "::warning::Failed to create token, using fallback"
            echo "token=fallback" >> "$GITHUB_OUTPUT"
          else
            echo "::add-mask::$TOKEN"

            # Create test repo
            curl -sS -o /tmp/repo.json -w "%{http_code}" \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"repo-demo-public","description":"ci test","private":false}' \
              http://127.0.0.1:3000/api/v1/user/repos || true

            echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        env:
          BASE_URL: http://127.0.0.1:3000/api/v1
          USERNAME: admin_user
          PASSWORD: Admin123456
          TOKEN: ${{ steps.bootstrap.outputs.token }}
          OWNER: admin_user
          PUBLIC_USER: admin_user
          REPO_NAME_BASE: repo-demo-public
          REPO_NAME_TEMP: repo-demo-temp
          PRIVATE_REPO_NAME: repo-demo-private
          COLLABORATOR: admin_user
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3308
          MYSQL_USER: gitea
          MYSQL_PASSWORD: gitea_secure_password
          MYSQL_DB: gitea
        run: |
          mkdir -p reports allure-results
          pytest -v --html=reports/pytest-report.html --self-contained-html --alluredir=allure-results || true

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results -o allure-report --clean || true
          fi

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest-report.html
          if-no-files-found: warn

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml down -v
