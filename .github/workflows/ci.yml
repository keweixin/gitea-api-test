name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Start Gitea and MySQL
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for Gitea
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              echo "Gitea is ready."
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.yml logs
          exit 1

      - name: Bootstrap test data
        id: bootstrap
        shell: bash
        run: |
          docker exec ci-gitea gitea admin user create             --username admin_user             --password Admin123456             --email admin@test.com             --admin             --must-change-password=false || true

          TOKEN_RESPONSE=$(curl -sS -u admin_user:Admin123456             -H "Content-Type: application/json"             -d '{"name":"ci-token"}'             http://127.0.0.1:3000/api/v1/users/admin_user/tokens)

          TOKEN=$(python -c "import json,sys; data=json.load(sys.stdin); print(data.get('sha1') or data.get('token') or '')" <<< "$TOKEN_RESPONSE")

          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to create CI token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          echo "::add-mask::$TOKEN"

          STATUS=$(curl -sS -o /tmp/repo.json -w "%{http_code}"             -H "Authorization: token $TOKEN"             -H "Content-Type: application/json"             -d '{"name":"repo-demo-public","description":"created for ci","private":false}'             http://127.0.0.1:3000/api/v1/user/repos)

          if [ "$STATUS" != "201" ] && [ "$STATUS" != "200" ] && [ "$STATUS" != "409" ]; then
            echo "::error::Failed to create base repository"
            cat /tmp/repo.json
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run test suite
        env:
          BASE_URL: http://127.0.0.1:3000/api/v1
          USERNAME: admin_user
          PASSWORD: Admin123456
          TOKEN: ${{ steps.bootstrap.outputs.token }}
          OWNER: admin_user
          PUBLIC_USER: admin_user
          REPO_NAME_BASE: repo-demo-public
          REPO_NAME_TEMP: repo-demo-temp
          PRIVATE_REPO_NAME: repo-demo-private
          COLLABORATOR: admin_user
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3308
          MYSQL_USER: gitea
          MYSQL_PASSWORD: gitea_secure_password
          MYSQL_DB: gitea
        run: |
          mkdir -p reports
          pytest -v --html=reports/pytest-report.html --self-contained-html --alluredir=allure-results

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload pytest HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest-report.html
          if-no-files-found: warn

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml down -v
